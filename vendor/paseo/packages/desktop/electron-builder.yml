npmRebuild: false
appId: one.clab.rocky
productName: Rocky
executableName: Rocky
afterPack: ./scripts/after-pack.js
afterSign: ./scripts/after-sign.js
directories:
  output: release
files:
  - dist/**/*
  - "!**/*.map"
  - "!node_modules/@getpaseo/*/src/**"
  - "!node_modules/@getpaseo/**/*.test.*"
  - "!node_modules/@getpaseo/**/*.spec.*"
asarUnpack:
  - dist/daemon/node-entrypoint-runner.js
  - node_modules/@getpaseo/server/dist/server/terminal/shell-integration/**/*
extraResources:
  - from: ../app/dist
    to: app-dist
  - from: ../../skills
    to: skills
publish: null
mac:
  artifactName: "Rocky-${version}-${arch}.${ext}"
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  hardenedRuntime: false
  notarize: false
  extraResources:
    - from: bin/rocky
      to: bin/rocky
  target:
    - dmg
    - zip
linux:
  category: Development
  icon: assets
  artifactName: "Rocky-${version}-${arch}.${ext}"
  maintainer: "Rocky <rocky@clab.one>"
  vendor: "Rocky"
  extraResources:
    - from: bin/rocky
      to: bin/rocky
  target:
    - AppImage
    - deb
    - rpm
    - tar.gz
win:
  artifactName: "Rocky-Setup-${version}-${arch}.${ext}"
  icon: assets/icon.ico
  extraResources:
    - from: bin/rocky.cmd
      to: bin/rocky.cmd
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
