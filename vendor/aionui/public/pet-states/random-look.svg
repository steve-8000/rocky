<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs><style>
    .look-body { transform-origin:11px 18px; animation:look-sway 4s ease-in-out infinite; }
    .look-eye { animation:look-eye 4s ease-in-out infinite; }
    .look-shadow { transform-origin:11px 22.5px; animation:look-shadow 4s ease-in-out infinite; }
    @keyframes look-sway { 0%,100%{transform:rotate(0)} 25%{transform:rotate(6deg) translateX(1px)} 75%{transform:rotate(-6deg) translateX(-1px)} }
    @keyframes look-eye { 0%,100%{transform:translateX(0)} 25%{transform:translateX(2px)} 50%{transform:translateX(0)} 75%{transform:translateX(-2px)} }
    @keyframes look-shadow { 0%,100%{transform:scaleX(1);opacity:.35} 25%{transform:scaleX(.95) translateX(1px);opacity:.3} 75%{transform:scaleX(.95) translateX(-1px);opacity:.3} }
  </style></defs>
  <ellipse class="look-shadow" cx="11" cy="22.5" rx="4" ry="0.6" fill="#c0c0c0"/>
  <g class="look-body">
    <rect x="2" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7" transform="rotate(45 3.5 10.5)"/>
    <rect x="17" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7" transform="rotate(45 18.5 10.5)"/>
    <rect x="5" y="6" width="12" height="12" rx="6" fill="#97A0C5"/>
    <polygon points="11,1 15,7 7,7" fill="#FF6B35"/>
    <rect x="10" y="2" width="1" height="1" fill="#e8714a"/>
    <g class="look-eye"><rect x="10" y="10" width="2" height="2" fill="#111827"/></g>
    <path d="M8 13.5 Q11 16.5 14 13.5" stroke="#111827" stroke-width="1" stroke-linecap="round" fill="none"/>
  </g>
</svg>
