<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs><style>
    .doze-body { transform-origin:11px 18px; animation:doze-nod 2.5s ease-in-out infinite; }
    .doze-shadow { transform-origin:11px 22.5px; animation:doze-shadow 2.5s ease-in-out infinite; }
    .doze-z1 { animation:doze-z 3.5s ease-in-out infinite; animation-delay:0s; opacity:0; }
    .doze-z2 { animation:doze-z 3.5s ease-in-out infinite; animation-delay:1.2s; opacity:0; }
    @keyframes doze-nod { 0%,100%{transform:rotate(0) translateY(0)} 40%{transform:rotate(5deg) translateY(2px)} 55%{transform:rotate(-3deg) translateY(-1px)} 70%{transform:rotate(3deg) translateY(1px)} }
    @keyframes doze-shadow { 0%,100%{transform:scaleX(1);opacity:.3} 40%{transform:scaleX(1.05);opacity:.35} }
    @keyframes doze-z { 0%{opacity:0;transform:translate(14px,6px) scale(.4)} 20%{opacity:.7} 80%{opacity:.3} 100%{opacity:0;transform:translate(18px,-2px) scale(.8)} }
  </style>
  <g id="doze-pz"><rect x="0" y="0" width="2.5" height="0.6"/><rect x="1.3" y="0.6" width="0.7" height="0.7"/><rect x="0.5" y="1.3" width="0.7" height="0.7"/><rect x="0" y="2" width="2.5" height="0.6"/></g>
  </defs>
  <use href="#doze-pz" class="doze-z1" fill="#8891b8"/>
  <use href="#doze-pz" class="doze-z2" fill="#a0a8c8"/>
  <ellipse class="doze-shadow" cx="11" cy="22.5" rx="4" ry="0.6" fill="#c0c0c0"/>
  <g class="doze-body">
    <rect x="2" y="10" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.55" transform="rotate(45 3.5 11.5)"/>
    <rect x="17" y="10" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.55" transform="rotate(45 18.5 11.5)"/>
    <rect x="5" y="6" width="12" height="12" rx="6" fill="#9098b8"/>
    <polygon points="11,1 15,7 7,7" fill="#d45a2a" transform="rotate(-10 11 5)"/>
        <rect x="10" y="2" width="1" height="1" fill="#e8714a" transform="rotate(-10 11 5)"/>
    <!-- 半闭眼 -->
    <rect x="9" y="10.5" width="4" height="0.8" rx="0.4" fill="#111827"/>
    <!-- 小嘴 -->
    <path d="M9.5 13.5 Q11 14.5 12.5 13.5" stroke="#111827" stroke-width="0.8" stroke-linecap="round" fill="none"/>
  </g>
</svg>
