# pr-automation.conf — default configuration for the PR automation daemon
# Environment variables override values defined here.
#
# Usage:
#   Sourced automatically by pr-automation.sh at startup.
#   To override at runtime:  CRITICAL_PATH_PATTERN="^packages/desktop/src/" ./scripts/pr-automation.sh

# Files matching this regex trigger human review (large PR or critical path).
# Uses ERE syntax (grep -E). Empty string disables the check.
CRITICAL_PATH_PATTERN='^\.claude/skills/|^scripts/|^packages/desktop/src/process/services/database/|^packages/desktop/src/preload/|^packages/desktop/electron-builder\.yml|^packages/desktop/electron\.vite\.config\.ts|^\.github/|^AGENTS\.md|^CLAUDE\.md|^readme\.md|^\.gitignore|^\.oxfmtrc\.json|^\.oxlintrc\.json|^\.prettierignore|^\.prettierrc\.json|^package\.json|^bun\.lock|^tsconfig\.json|^uno\.config\.ts|^\.pre-commit-config\.yaml|^codecov\.yml|^entitlements\.plist|^docs/|^\.npmrc'

# Only process PRs created within the last N days
PR_DAYS_LOOKBACK=7

# Seconds to sleep between Claude runs
SLEEP_SECONDS=30

# Maximum seconds a single Claude run may take
MAX_CLAUDE_SECS=3600

# PRs with more changed files than this threshold require human review
LARGE_PR_FILE_THRESHOLD=50

# Claude model to use (e.g. sonnet, opus, haiku)
CLAUDE_MODEL=sonnet
