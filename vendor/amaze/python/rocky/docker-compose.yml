services:
  # ───────────────────────────────────────────────────────────────────────────
  # rocky orchestrator
  #
  # NOTE: `env_file:` is INTENTIONALLY ABSENT. We never want the gh-proxy's
  # PAT (`GITHUB_TOKEN` in .env) to leak into this container's environment.
  # Every variable below is an explicit allowlist; compose still reads `.env`
  # for `${VAR}` interpolation, but only the keys listed here flow into the
  # container. Adding a new secret means an explicit compose-level decision
  # about which container is allowed to see it.
  # ───────────────────────────────────────────────────────────────────────────
  rocky:
    build:
      # amaze root: gives the web-builder stage access to the workspace
      # bun.lock + catalog (web/package.json refs `catalog:` versions).
      # python/rocky/data and pi-root excludes are filtered via
      # Dockerfile.rocky.dockerignore at the context root.
      context: ../..
      dockerfile: Dockerfile.rocky
      args:
        # Tag of the pre-built amaze-base image produced by `bun run amaze:image`
        # (sources: amaze root /Dockerfile). Override per-environment as needed.
        AMAZE_BASE: amaze/amaze:dev
    image: rocky:dev
    container_name: rocky
    # Phase B (graceful shutdown): gives the orchestrator at least
    # ROCKY_SHUTDOWN_DRAIN_TIMEOUT_SECONDS + ROCKY_SHUTDOWN_KILL_TIMEOUT_SECONDS
    # before SIGKILL. Defaults: 25 + 5 = 30s.
    stop_grace_period: 30s
    restart: unless-stopped
    environment:
      # Keep this equal to stop_grace_period so Settings can fail fast if
      # drain+kill windows would outlive Docker's SIGKILL deadline.
      ROCKY_COMPOSE_STOP_GRACE_PERIOD_SECONDS: 30
      # --- gh-proxy channel ---
      # The orchestrator NEVER holds GITHUB_TOKEN; it talks to the sibling
      # gh-proxy container over the internal-only network.
      ROCKY_GH_PROXY_URL: http://gh-proxy:8081
      ROCKY_GH_PROXY_HMAC_KEY: ${ROCKY_GH_PROXY_HMAC_KEY:?ROCKY_GH_PROXY_HMAC_KEY must be set in .env}

      # --- webhook + identity ---
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRET must be set in .env}
      ROCKY_BOT_LOGIN: ${ROCKY_BOT_LOGIN:?ROCKY_BOT_LOGIN must be set in .env}
      ROCKY_GIT_AUTHOR_NAME: ${ROCKY_GIT_AUTHOR_NAME:-}
      ROCKY_GIT_AUTHOR_EMAIL: ${ROCKY_GIT_AUTHOR_EMAIL:?ROCKY_GIT_AUTHOR_EMAIL must be set in .env}
      ROCKY_REPO_ALLOWLIST: ${ROCKY_REPO_ALLOWLIST:?ROCKY_REPO_ALLOWLIST must be set in .env}
      ROCKY_MAINTAINER_LOGINS: ${ROCKY_MAINTAINER_LOGINS:-}
      ROCKY_REVIEWER_BOTS: ${ROCKY_REVIEWER_BOTS:-}

      # --- model selection ---
      ROCKY_MODEL: ${ROCKY_MODEL:-anthropic/claude-sonnet-4-6}
      ROCKY_PROVIDER: ${ROCKY_PROVIDER:-}
      ROCKY_THINKING: ${ROCKY_THINKING:-high}

      # --- runtime tuning ---
      ROCKY_MAX_CONCURRENCY: ${ROCKY_MAX_CONCURRENCY:-8}
      ROCKY_TASK_TIMEOUT_SECONDS: ${ROCKY_TASK_TIMEOUT_SECONDS:-2400}
      ROCKY_TASK_TIMEOUT_HARD_GRACE_SECONDS: ${ROCKY_TASK_TIMEOUT_HARD_GRACE_SECONDS:-60}
      ROCKY_REQUEST_TIMEOUT_SECONDS: ${ROCKY_REQUEST_TIMEOUT_SECONDS:-120}
      ROCKY_SHUTDOWN_DRAIN_TIMEOUT_SECONDS: ${ROCKY_SHUTDOWN_DRAIN_TIMEOUT_SECONDS:-25}
      ROCKY_SHUTDOWN_KILL_TIMEOUT_SECONDS: ${ROCKY_SHUTDOWN_KILL_TIMEOUT_SECONDS:-5}
      ROCKY_SQLITE_SYNCHRONOUS: ${ROCKY_SQLITE_SYNCHRONOUS:-FULL}
      ROCKY_RATE_LIMIT_WINDOW_SECONDS: ${ROCKY_RATE_LIMIT_WINDOW_SECONDS:-3600}
      ROCKY_RATE_LIMIT_DEFAULT: ${ROCKY_RATE_LIMIT_DEFAULT:-3}
      ROCKY_RATE_LIMIT_CONTRIBUTOR: ${ROCKY_RATE_LIMIT_CONTRIBUTOR:-10}
      ROCKY_RATE_LIMIT_UNLIMITED: ${ROCKY_RATE_LIMIT_UNLIMITED:-}
      ROCKY_QUESTION_AUTOCLOSE_ENABLED: ${ROCKY_QUESTION_AUTOCLOSE_ENABLED:-true}
      ROCKY_QUESTION_AUTOCLOSE_HOURS: ${ROCKY_QUESTION_AUTOCLOSE_HOURS:-4}
      ROCKY_QUESTION_AUTOCLOSE_SCAN_SECONDS: ${ROCKY_QUESTION_AUTOCLOSE_SCAN_SECONDS:-60}
      ROCKY_REPLAY_TOKEN: ${ROCKY_REPLAY_TOKEN:-}

      # --- container-fixed paths ---
      ROCKY_AMAZE_COMMAND: amaze
      ROCKY_WORKSPACE_ROOT: /data/workspaces
      ROCKY_SQLITE_PATH: /data/rocky.sqlite
      ROCKY_LOG_DIR: /data/logs
      ROCKY_BIND_HOST: ${ROCKY_BIND_HOST:-0.0.0.0}
      ROCKY_BIND_PORT: ${ROCKY_BIND_PORT:-8080}
      AMAZE_ROOT: /work/amaze
    depends_on:
      gh-proxy:
        condition: service_healthy
    # Resolve `llm-gateway.internal` (used in /srv/agent-home/.amaze/agent/models.yml) to the
    # Docker host. The actual gateway listens on 127.0.0.1:4000 on the host;
    # `host-gateway` is Docker's alias for the host bridge IP.
    extra_hosts:
      - "llm-gateway.internal:host-gateway"
    networks:
      - default
      - rocky_internal
    volumes:
      - ${AMAZE_ROOT:-../..}:/work/amaze:ro
      - rocky_data:/data
      # Host agent config is mounted read-only under /srv/agent-home-stage
      # with host-controlled permissions. The entrypoint copies it into
      # root-owned, world-readable files under /srv/agent-home; the agent
      # subprocess runs with HOME=/srv/agent-home, so ~/.amaze and ~/.agent
      # resolve there without exposing mutable host mounts.
      - ${HOME}/.amaze/agent/models.container.yml:/srv/agent-home-stage/.amaze/agent/models.yml:ro
      - ${HOME}/.agent/AGENT.md:/srv/agent-home-stage/.agent/AGENTS.md:ro
      - ${HOME}/.agent/rules:/srv/agent-home-stage/.agent/rules:ro
    ports:
      - "0.0.0.0:6543:8080"

  # ───────────────────────────────────────────────────────────────────────────
  # gh-proxy
  #
  # The only container that ever holds GITHUB_TOKEN. Reachable only from the
  # orchestrator on the internal-only network — no host port mapping. Every
  # request must carry a valid HMAC signature (ROCKY_GH_PROXY_HMAC_KEY).
  # `env_file:` is INTENTIONALLY ABSENT for the same reason: the explicit
  # allowlist below is the only place where any var lands in this container.
  # ───────────────────────────────────────────────────────────────────────────
  gh-proxy:
    image: rocky:dev
    container_name: gh-proxy
    restart: unless-stopped
    command: ["python", "-m", "rocky.proxy", "serve"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/healthz', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    environment:
      # PAT: lives ONLY here. The orchestrator's compose block refuses to
      # let this var into its container.
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN must be set in .env}
      # Shared with the orchestrator: HMAC verification key.
      ROCKY_GH_PROXY_HMAC_KEY: ${ROCKY_GH_PROXY_HMAC_KEY:?ROCKY_GH_PROXY_HMAC_KEY must be set in .env}
      # The proxy reuses the SandboxManager pool layout under /data/workspaces.
      ROCKY_WORKSPACE_ROOT: /data/workspaces
      ROCKY_SQLITE_PATH: /data/rocky.sqlite
      ROCKY_LOG_DIR: /data/logs
      # Bind on the internal network only.
      ROCKY_GH_PROXY_BIND_HOST: 0.0.0.0
      ROCKY_GH_PROXY_BIND_PORT: 8081
      # Settings still requires these on construction; the proxy never uses
      # them but the validator runs the same code path as the orchestrator.
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRET must be set in .env}
      ROCKY_BOT_LOGIN: ${ROCKY_BOT_LOGIN:?ROCKY_BOT_LOGIN must be set in .env}
      ROCKY_GIT_AUTHOR_EMAIL: ${ROCKY_GIT_AUTHOR_EMAIL:?ROCKY_GIT_AUTHOR_EMAIL must be set in .env}
      ROCKY_REPO_ALLOWLIST: ${ROCKY_REPO_ALLOWLIST:?ROCKY_REPO_ALLOWLIST must be set in .env}
    networks:
      # `default` gives gh-proxy outbound NAT to api.github.com; `rocky_internal`
      # is how the orchestrator reaches it. No `ports:` mapping → still
      # unreachable from the host or any sibling project.
      - default
      - rocky_internal
    volumes:
      # Shared workspace pool/worktrees so the proxy can drive git operations
      # against the same per-issue worktrees the orchestrator builds.
      - rocky_data:/data

networks:
  # External-facing bridge: webhook ingress (8080) and the orchestrator's
  # outbound path to the host LLM gateway via extra_hosts.
  default: {}
  # Orchestrator <-> gh-proxy only. internal: true means no egress and no
  # ingress from outside the compose project.
  rocky_internal:
    internal: true

volumes:
  # Docker-managed Linux volume so UID/GID permissions on /data are enforced.
  rocky_data: {}
